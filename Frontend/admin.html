 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — CineVault</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <!-- ================= NAVBAR ================= -->
  <nav class="cv-navbar navbar navbar-expand-lg">
    <div class="container-fluid px-0 d-flex align-items-center w-100">
      <a class="navbar-brand" href="dashboard.html"><i class="fa-solid fa-clapperboard"></i> CineVault Admin</a>
      <button class="navbar-toggler ms-auto" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-label="Toggle navigation">
        <i class="fa-solid fa-bars"></i>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link active" href="admin.html">Admin</a></li>
          <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
          <li class="nav-item ms-lg-2">
            <button id="logoutBtn" class="btn-cv-primary px-3 py-2">
              <i class="fa-solid fa-right-from-bracket me-2"></i>Logout
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- ================= PAGE ================= -->
  <div class="container-fluid" style="padding: calc(var(--nav-height) + 2.5rem) 6% 4rem;">

    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
      <div>
        <h2 class="mb-1">Movie Management</h2>
        <p class="text-secondary mb-0">Add, edit, and remove titles from the CineVault catalog.</p>
      </div>
      <a href="movie.html" class="btn-cv-primary">
        <i class="fa-solid fa-plus me-2"></i>Add Movie
      </a>
    </div>

    <!-- Stat cards -->
    <div class="row g-4 mb-4">
      <div class="col-md-4">
        <div class="admin-card">
          <i class="fa-solid fa-film admin-icon"></i>
          <h5>Total Movies</h5>
          <h2 id="totalMovies">0</h2>
        </div>
      </div>
      <div class="col-md-4">
        <div class="admin-card">
          <i class="fa-solid fa-star admin-icon"></i>
          <h5>Top Rated</h5>
          <h2 id="topRated">--</h2>
        </div>
      </div>
      <div class="col-md-4">
        <div class="admin-card">
          <i class="fa-solid fa-language admin-icon"></i>
          <h5>Languages</h5>
          <h2 id="languageCount">0</h2>
        </div>
      </div>
    </div>

    <!-- Search -->
    <div class="dash-panel mb-4">
      <div class="row">
        <div class="col-md-6">
          <div class="position-relative">
            <i class="fa-solid fa-magnifying-glass" style="position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-tertiary);"></i>
            <input id="searchMovie" type="text" class="form-control" style="padding-left:2.6rem;" placeholder="Search movie by title...">
          </div>
        </div>
      </div>
    </div>

    <!-- Movie Table -->
    <div class="dash-panel p-0 overflow-hidden">
      <div class="table-responsive">
        <table class="table table-dark table-hover align-middle mb-0">
          <thead>
            <tr>
              <th>#</th>
              <th>Title</th>
              <th>Genre</th>
              <th>Language</th>
              <th>Year</th>
              <th>Rating</th>
              <th width="180">Actions</th>
            </tr>
          </thead>
          <tbody id="movieTableBody">
            <!-- JS Will Load Movies Here -->
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/admin.js"></script>
</body>
</html>
